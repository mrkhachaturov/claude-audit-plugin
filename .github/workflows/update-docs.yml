name: Update Claude Code Documentation

on:
  schedule:
    # Run every 3 hours (at 00:00, 03:00, 06:00, 09:00, 12:00, 15:00, 18:00, 21:00 UTC)
    - cron: '0 */3 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  issues: write

jobs:
  update-docs:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        ref: main
        fetch-depth: 2
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r scripts/requirements.txt
    
    - name: Fetch latest documentation
      id: fetch-docs
      env:
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_REF_NAME: ${{ github.ref_name }}
      run: |
        python scripts/fetch_claude_docs.py || echo "fetch_failed=true" >> $GITHUB_OUTPUT
      continue-on-error: true
    
    - name: Check seed significance
      id: seed-check
      run: python scripts/check_significance.py >> $GITHUB_OUTPUT

    - name: Rebuild seed with Codex
      if: steps.seed-check.outputs.rebuild == 'true'
      id: codex-rebuild
      continue-on-error: true
      uses: openai/codex-action@v1
      with:
        openai-api-key: ${{ secrets.OPENAI_API_KEY }}
        prompt-file: .github/prompts/build-seed.md
        output-file: codex-seed-output.md
        safety-strategy: drop-sudo
        sandbox: workspace-write

    - name: Validate seed output
      if: steps.seed-check.outputs.rebuild == 'true' && steps.codex-rebuild.outcome == 'success'
      id: seed-validate
      run: python scripts/validate_seed.py --allow-prefix docs/

    - name: Bump version if seed changed
      if: steps.seed-validate.outcome == 'success'
      env:
        CHANGED_DOCS: ${{ steps.seed-check.outputs.changed_docs }}
      run: python scripts/bump_version.py

    - name: Create issue on Codex failure
      if: steps.codex-rebuild.outcome == 'failure' || steps.seed-validate.outcome == 'failure'
      uses: actions/github-script@v7
      with:
        script: |
          const date = new Date().toISOString().split('T')[0];
          await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `Seed rebuild failed - ${date}`,
            body: `Seed rebuild failed on ${date}. Docs updated normally. See workflow run for details.`,
            labels: ['bug', 'automation']
          })

    - name: Discard seed changes on failure
      if: steps.codex-rebuild.outcome == 'failure' || steps.seed-validate.outcome == 'failure'
      run: |
        git checkout -- agent-memory-seed/ || true
        git checkout -- .claude-plugin/plugin.json || true
        git checkout -- CHANGELOG.md || true
        git clean -fd agent-memory-seed/ || true

    - name: Debug staging decisions
      run: |
        echo "=== Staging decision dry-run ==="
        echo "seed-check.rebuild     : ${{ steps.seed-check.outputs.rebuild }}"
        echo "codex-rebuild.outcome  : ${{ steps.codex-rebuild.outcome }}"
        echo "seed-validate.outcome  : ${{ steps.seed-validate.outcome }}"
        echo ""
        if [ "${{ steps.seed-validate.outcome }}" = "success" ]; then
          echo "Seed path: FULL — staging docs/ + agent-memory-seed/generated/ + plugin.json + CHANGELOG.md"
          git add -n -A agent-memory-seed/generated/ .claude-plugin/plugin.json CHANGELOG.md 2>&1 | sed 's/^/  [seed] /' || echo "  [seed] (no changes)"
        else
          echo "Seed path: DOCS ONLY — seed files excluded from this commit"
        fi
        git add -n -A docs/ 2>&1 | sed 's/^/  [docs] /' || echo "  [docs] (no changes)"

    - name: Check for changes
      id: verify-changed-files
      run: |
        git add -A docs/
        if [ "${{ steps.seed-validate.outcome }}" = "success" ]; then
          git add -A agent-memory-seed/generated/ .claude-plugin/plugin.json CHANGELOG.md
        fi
        git diff --cached --exit-code || echo "changed=true" >> $GITHUB_OUTPUT

    - name: Generate commit message
      if: steps.verify-changed-files.outputs.changed == 'true'
      id: commit-msg
      run: |
        # Files already staged in previous step
        
        # Get list of changed files
        CHANGED_FILES=$(git diff --name-status --cached | grep "^M" | cut -f2 | grep -E "\.md$" | sed 's/docs\///' | paste -sd ", " -)
        ADDED_FILES=$(git diff --name-status --cached | grep "^A" | cut -f2 | grep -E "\.md$" | sed 's/docs\///' | paste -sd ", " -)
        DELETED_FILES=$(git diff --name-status --cached | grep "^D" | cut -f2 | grep -E "\.md$" | sed 's/docs\///' | paste -sd ", " -)
        
        # Build commit message
        COMMIT_MSG="Update Claude Code docs - $(date +'%Y-%m-%d')"
        
        if [ -n "$CHANGED_FILES" ]; then
          COMMIT_MSG="$COMMIT_MSG | Updated: $CHANGED_FILES"
        fi
        
        if [ -n "$ADDED_FILES" ]; then
          COMMIT_MSG="$COMMIT_MSG | Added: $ADDED_FILES"
        fi
        
        if [ -n "$DELETED_FILES" ]; then
          COMMIT_MSG="$COMMIT_MSG | Removed: $DELETED_FILES"
        fi
        
        echo "message=$COMMIT_MSG" >> $GITHUB_OUTPUT
    
    - name: Commit and push if changed
      if: steps.verify-changed-files.outputs.changed == 'true'
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        # Files already staged in previous step
        git commit -m "${{ steps.commit-msg.outputs.message }}"
        git push
    
    - name: Create issue on failure
      if: steps.fetch-docs.outputs.fetch_failed == 'true'
      uses: actions/github-script@v7
      with:
        script: |
          const date = new Date().toISOString().split('T')[0];
          await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `Documentation update failed - ${date}`,
            body: `The automated documentation update failed on ${date}.\n\nPlease check the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`,
            labels: ['bug', 'automation']
          })
